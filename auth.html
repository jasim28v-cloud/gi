<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID LION | بوابة الدخول</title>
    <base href="./">
    
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@200;300;400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            background: #000;
            overflow: hidden;
        }

        /* ===== خلفية متحركة سينمائية ===== */
        .video-background {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .particles {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 127, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(0, 255, 136, 0.04) 0%, transparent 35%),
                radial-gradient(circle at 70% 20%, rgba(0, 102, 255, 0.05) 0%, transparent 30%);
            animation: particleFloat 20s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(1deg); }
            50% { transform: scale(1.05) rotate(-1deg); }
            75% { transform: scale(1.15) rotate(0.5deg); }
        }

        .grid-lines {
            position: absolute;
            inset: 0;
            background-image: 
                repeating-linear-gradient(0deg, rgba(0, 242, 255, 0.02) 0px, transparent 1px, transparent 40px),
                repeating-linear-gradient(90deg, rgba(0, 242, 255, 0.02) 0px, transparent 1px, transparent 40px);
            background-size: 40px 40px;
            animation: gridShift 30s linear infinite;
        }

        @keyframes gridShift {
            0% { transform: perspective(500px) rotateX(45deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(45deg) translateY(40px); }
        }

        .glow-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            animation: orbFloat 12s ease-in-out infinite;
            filter: blur(40px);
        }

        .glow-orb-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 0, 127, 0.1) 0%, transparent 70%);
            bottom: -150px;
            right: -100px;
            animation: orbFloat2 15s ease-in-out infinite;
            filter: blur(50px);
        }

        .glow-orb-3 {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: orbPulse 8s ease-in-out infinite;
            filter: blur(30px);
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(50px, 30px); }
            66% { transform: translate(-30px, 50px); }
        }

        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-40px, -20px); }
            66% { transform: translate(30px, -40px); }
        }

        @keyframes orbPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.8; }
        }

        /* ===== الحاوية الرئيسية ===== */
        .auth-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 520px;
            animation: containerAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes containerAppear {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(40px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ===== بطاقة زجاجية فاخرة ===== */
        .luxury-card {
            background: rgba(5, 15, 25, 0.7);
            backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 48px;
            padding: 45px 35px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.7),
                0 0 120px rgba(0, 242, 255, 0.1),
                inset 0 0 40px rgba(0, 242, 255, 0.03);
            position: relative;
            overflow: hidden;
        }

        .luxury-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f2ff, #ff007f, #00ff88, transparent);
            animation: borderFlow 4s linear infinite;
        }

        @keyframes borderFlow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .luxury-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 48px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.3), rgba(255, 0, 127, 0.3), rgba(0, 255, 136, 0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
            pointer-events: none;
        }

        /* ===== الشعار ===== */
        .brand-section {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .brand-icon {
            font-size: 70px;
            color: #00f2ff;
            filter: drop-shadow(0 0 40px rgba(0, 242, 255, 0.6));
            animation: iconGlow 3s ease-in-out infinite;
            position: relative;
        }

        @keyframes iconGlow {
            0%, 100% { filter: drop-shadow(0 0 30px rgba(0, 242, 255, 0.4)); }
            50% { filter: drop-shadow(0 0 60px rgba(0, 242, 255, 0.8)); }
        }

        .brand-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: iconRing 2s ease-in-out infinite;
        }

        @keyframes iconRing {
            0%, 100% { width: 80px; height: 80px; opacity: 0.3; }
            50% { width: 100px; height: 100px; opacity: 0.1; }
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 44px;
            font-weight: 900;
            letter-spacing: 8px;
            margin-top: 20px;
            background: linear-gradient(135deg, #00f2ff 0%, #00ff88 40%, #ff007f 70%, #00f2ff 100%);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 6s linear infinite;
            text-transform: uppercase;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .brand-slogan {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            letter-spacing: 6px;
            margin-top: 8px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* ===== التبويبات ===== */
        .tabs-wrapper {
            margin-bottom: 35px;
            padding: 6px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 80px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            display: flex;
            position: relative;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 10px;
            background: transparent;
            border: none;
            border-radius: 60px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn i {
            font-size: 16px;
        }

        .tab-btn.active {
            color: #000;
        }

        .tab-indicator {
            position: absolute;
            top: 6px;
            left: 6px;
            width: calc(50% - 6px);
            height: calc(100% - 12px);
            background: linear-gradient(135deg, #00f2ff, #0066ff);
            border-radius: 60px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 5px 20px rgba(0, 242, 255, 0.4);
        }

        .tab-indicator.right {
            transform: translateX(100%);
        }

        /* ===== النماذج ===== */
        .auth-form {
            transition: opacity 0.3s;
        }

        .auth-form.hidden {
            display: none;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 22px;
        }

        .input-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #00f2ff;
            font-size: 18px;
            transition: all 0.3s;
            z-index: 2;
            pointer-events: none;
        }

        .luxury-input {
            width: 100%;
            padding: 17px 55px 17px 20px;
            background: rgba(0, 0, 0, 0.35);
            border: 1.5px solid rgba(0, 242, 255, 0.15);
            border-radius: 24px;
            color: #fff;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: all 0.4s;
        }

        .luxury-input:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
            padding-right: 60px;
        }

        .luxury-input:focus + .input-icon {
            color: #fff;
            text-shadow: 0 0 15px #00f2ff;
            transform: translateY(-50%) scale(1.1);
        }

        .luxury-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 300;
            font-size: 15px;
        }

        /* زر الرؤية لكلمة المرور */
        .password-toggle {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 18px;
            cursor: pointer;
            z-index: 3;
            transition: all 0.3s;
        }

        .password-toggle:hover {
            color: #00f2ff;
        }

        /* ===== زر الإرسال ===== */
        .submit-btn {
            width: 100%;
            padding: 18px;
            margin-top: 25px;
            background: linear-gradient(135deg, #00f2ff 0%, #0066ff 100%);
            border: none;
            border-radius: 30px;
            color: #000;
            font-size: 19px;
            font-weight: 900;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 242, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s;
        }

        .submit-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 242, 255, 0.4);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:active {
            transform: translateY(-2px);
        }

        .submit-btn i {
            font-size: 18px;
        }

        /* ===== رسائل التنبيه ===== */
        .alert-box {
            margin-top: 25px;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
            backdrop-filter: blur(15px);
            transition: all 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 500;
        }

        .alert-box.error {
            background: rgba(255, 0, 85, 0.12);
            border: 1px solid rgba(255, 0, 85, 0.3);
            color: #ff6b9d;
        }

        .alert-box.success {
            background: rgba(0, 255, 136, 0.12);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #6bffb8;
        }

        .alert-box.info {
            background: rgba(0, 242, 255, 0.12);
            border: 1px solid rgba(0, 242, 255, 0.3);
            color: #6bf0ff;
        }

        .alert-box i {
            font-size: 18px;
        }

        /* ===== روابط إضافية ===== */
        .extra-links {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .extra-link {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            text-decoration: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .extra-link:hover {
            color: #00f2ff;
        }

        .extra-link i {
            font-size: 14px;
        }

        /* ===== تذييل ===== */
        .footer-note {
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            letter-spacing: 2px;
        }

        /* ===== تجاوب ===== */
        @media (max-width: 480px) {
            .luxury-card {
                padding: 35px 20px;
                border-radius: 36px;
            }
            
            .brand-name {
                font-size: 32px;
                letter-spacing: 4px;
            }
            
            .tab-btn {
                padding: 12px 8px;
                font-size: 16px;
            }
            
            .luxury-input {
                padding: 15px 50px 15px 18px;
            }
        }

        /* تأثير نجاح */
        .success-checkmark {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="video-background">
        <div class="particles"></div>
        <div class="grid-lines"></div>
        <div class="glow-orb"></div>
        <div class="glow-orb-2"></div>
        <div class="glow-orb-3"></div>
    </div>

    <!-- الحاوية الرئيسية -->
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="luxury-card">
                <!-- الشعار -->
                <div class="brand-section">
                    <i class="fas fa-crown brand-icon"></i>
                    <div class="brand-name">VOID LION</div>
                    <div class="brand-slogan">ELITE ACCESS</div>
                </div>

                <!-- التبويبات -->
                <div class="tabs-wrapper">
                    <div class="tab-indicator" id="tabIndicator"></div>
                    <button class="tab-btn active" id="tabLogin">
                        <i class="fas fa-sign-in-alt"></i>
                        <span>دخول</span>
                    </button>
                    <button class="tab-btn" id="tabRegister">
                        <i class="fas fa-user-plus"></i>
                        <span>اشتراك</span>
                    </button>
                </div>

                <!-- نموذج الدخول -->
                <form id="loginForm" class="auth-form">
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="loginEmail" class="luxury-input" placeholder="البريد الإلكتروني" required>
                    </div>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="loginPassword" class="luxury-input" placeholder="كلمة المرور" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('loginPassword', this)"></i>
                    </div>
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-arrow-left"></i>
                        <span>دخول إلى الفراغ</span>
                    </button>
                </form>

                <!-- نموذج الاشتراك -->
                <form id="registerForm" class="auth-form hidden">
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="regUsername" class="luxury-input" placeholder="اسم المستخدم" required>
                    </div>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="regEmail" class="luxury-input" placeholder="البريد الإلكتروني" required>
                    </div>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="regPassword" class="luxury-input" placeholder="كلمة المرور" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('regPassword', this)"></i>
                    </div>
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-user-check"></i>
                        <span>إنشاء حساب جديد</span>
                    </button>
                </form>

                <!-- رسائل التنبيه -->
                <div id="alertBox" class="alert-box" style="display: none;"></div>

                <!-- روابط إضافية -->
                <div class="extra-links">
                    <a href="#" class="extra-link"><i class="fas fa-shield-alt"></i> نسيت كلمة المرور؟</a>
                    <a href="index.html" class="extra-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
                </div>
            </div>
            
            <!-- تذييل -->
            <div class="footer-note">
                <i class="fas fa-circle" style="font-size: 4px;"></i> 
                تشفير كمومي من الجيل السابع 
                <i class="fas fa-circle" style="font-size: 4px;"></i>
            </div>
        </div>
    </div>

    <!-- السكريبتات -->
    <script src="./js/firebase.js"></script>
    <script src="./js/auth.js"></script>
    
    <script>
        // تبديل كلمة المرور
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // العناصر
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const tabIndicator = document.getElementById('tabIndicator');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const alertBox = document.getElementById('alertBox');

        // إظهار رسالة
        function showAlert(text, type = 'info') {
            alertBox.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${text}`;
            alertBox.className = `alert-box ${type}`;
            alertBox.style.display = 'flex';
            
            if (type === 'success') {
                setTimeout(() => alertBox.style.display = 'none', 3000);
            }
        }

        // تبديل التبويبات
        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            tabIndicator.classList.remove('right');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            alertBox.style.display = 'none';
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            tabIndicator.classList.add('right');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            alertBox.style.display = 'none';
        });

        // تسجيل الدخول
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showAlert('يرجى إدخال البريد الإلكتروني وكلمة المرور', 'error');
                return;
            }
            
            showAlert('🔄 جاري تسجيل الدخول...', 'info');
            
            const result = await VoidAuth.login(email, password);
            
            if (result.success) {
                showAlert('✅ تم تسجيل الدخول بنجاح!', 'success');
                setTimeout(() => window.location.href = 'index.html', 1000);
            } else {
                showAlert(result.error, 'error');
            }
        });

        // إنشاء حساب
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            
            if (!username || !email || !password) {
                showAlert('يرجى ملء جميع الحقول', 'error');
                return;
            }
            
            if (username.length < 3) {
                showAlert('اسم المستخدم يجب أن يكون 3 أحرف على الأقل', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }
            
            showAlert('🔄 جاري إنشاء الحساب...', 'info');
            
            const result = await VoidAuth.register(username, email, password);
            
            if (result.success) {
                showAlert('🎉 تم إنشاء الحساب بنجاح!', 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                showAlert(result.error, 'error');
            }
        });

        // تأثيرات إضافية للحقول
        document.querySelectorAll('.luxury-input').forEach(field => {
            field.addEventListener('focus', function() {
                this.style.transition = 'all 0.4s';
            });
        });

        // تحويل تلقائي إذا كان مسجل
        if (VoidAuth.currentUser) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
