<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID LION | الدخول</title>
    <base href="./">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        .auth-page { background: radial-gradient(circle at 30% 50%, #0a1a2a, #000); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: rgba(10,20,30,0.9); backdrop-filter: blur(20px); border: 1px solid #00f2ff; border-radius: 40px; padding: 40px 30px; max-width: 420px; width: 100%; box-shadow: 0 0 60px rgba(0,242,255,0.2); }
    </style>
</head>
<body class="auth-page">
    <div class="auth-card">
        <div style="text-align:center;margin-bottom:30px">
            <i class="fas fa-lion" style="font-size:60px;color:#00f2ff"></i>
            <h1 style="font-family:'Orbitron';color:#00f2ff;margin-top:10px">VOID LION</h1>
            <p style="color:#00f2ff;opacity:0.7">بوابة الفراغ الرقمي</p>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:25px">
            <button class="tab-btn active" id="tabLogin" style="flex:1;padding:12px;background:transparent;border:none;color:#00f2ff;border-bottom:2px solid #00f2ff">دخول</button>
            <button class="tab-btn" id="tabRegister" style="flex:1;padding:12px;background:transparent;border:none;color:rgba(255,255,255,0.5)">اشتراك</button>
        </div>
        <form id="loginForm">
            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="كلمة المرور" required></div>
            <button type="submit" class="btn-submit">دخول 🚀</button>
        </form>
        <form id="registerForm" style="display:none">
            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="regUsername" placeholder="اسم المستخدم" required></div>
            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="البريد الإلكتروني" required></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="كلمة المرور" required></div>
            <button type="submit" class="btn-submit">إنشاء حساب 🚀</button>
        </form>
        <div id="message" style="margin-top:20px;padding:10px;border-radius:10px;text-align:center"></div>
    </div>
    <script src="./js/firebase.js"></script>
    <script src="./js/auth.js"></script>
    <script>
        const loginTab = document.getElementById('tabLogin');
        const registerTab = document.getElementById('tabRegister');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const msg = document.getElementById('message');
        
        loginTab.onclick = () => { loginTab.style.color='#00f2ff'; loginTab.style.borderBottom='2px solid #00f2ff'; registerTab.style.color='rgba(255,255,255,0.5)'; registerTab.style.borderBottom='none'; loginForm.style.display='block'; registerForm.style.display='none'; };
        registerTab.onclick = () => { registerTab.style.color='#00f2ff'; registerTab.style.borderBottom='2px solid #00f2ff'; loginTab.style.color='rgba(255,255,255,0.5)'; loginTab.style.borderBottom='none'; registerForm.style.display='block'; loginForm.style.display='none'; };
        
        loginForm.onsubmit = async e => { e.preventDefault(); msg.textContent='جاري الدخول...'; msg.style.color='#00f2ff'; const r=await VoidAuth.login(loginEmail.value,loginPassword.value); msg.textContent=r.success?'✅ تم الدخول':r.error; msg.style.color=r.success?'#00ff88':'#ff0055'; if(r.success) setTimeout(()=>location.href='index.html',500); };
        registerForm.onsubmit = async e => { e.preventDefault(); msg.textContent='جاري إنشاء الحساب...'; msg.style.color='#00f2ff'; const r=await VoidAuth.register(regUsername.value,regEmail.value,regPassword.value); msg.textContent=r.success?'✅ تم إنشاء الحساب':r.error; msg.style.color=r.success?'#00ff88':'#ff0055'; if(r.success) setTimeout(()=>location.href='index.html',500); };
    </script>
</body>
</html>
