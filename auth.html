<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID LION | الدخول</title>
    <base href="./">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@200;300;400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            background: #000;
            overflow: hidden;
        }

        /* خلفية متحركة */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 127, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(0, 255, 136, 0.04) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* حاوية رئيسية */
        .auth-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* بطاقة زجاجية */
        .glass-panel {
            background: rgba(5, 15, 25, 0.75);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 40px;
            padding: 40px 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), 0 0 100px rgba(0,242,255,0.1);
        }

        /* الشعار */
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 55px;
            color: #00f2ff;
            filter: drop-shadow(0 0 30px #00f2ff);
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)}
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 6px;
            margin-top: 10px;
            background: linear-gradient(135deg, #00f2ff, #00ff88, #00f2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer {
            0%{background-position:0%} 100%{background-position:200%}
        }

        .logo-subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            letter-spacing: 4px;
            margin-top: 5px;
        }

        /* تبويبات */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            padding: 5px;
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
            border: 1px solid rgba(0,242,255,0.15);
        }

        .tab {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            background: transparent;
            color: rgba(255,255,255,0.5);
        }

        .tab.active {
            background: linear-gradient(135deg, #00f2ff, #0066ff);
            color: #000;
            box-shadow: 0 5px 20px rgba(0,242,255,0.3);
        }

        /* نموذج */
        .auth-form {
            transition: 0.3s;
        }

        .auth-form.hidden {
            display: none;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #00f2ff;
            font-size: 16px;
        }

        .input-field {
            width: 100%;
            padding: 16px 50px 16px 18px;
            background: rgba(0,0,0,0.4);
            border: 1.5px solid rgba(0,242,255,0.2);
            border-radius: 18px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 20px rgba(0,242,255,0.2);
        }

        .input-field::placeholder {
            color: rgba(255,255,255,0.35);
        }

        .password-toggle {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            cursor: pointer;
        }

        .password-toggle:hover {
            color: #00f2ff;
        }

        /* زر */
        .submit-btn {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(135deg, #00f2ff, #0066ff);
            border: none;
            border-radius: 18px;
            color: #000;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,242,255,0.2);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,242,255,0.4);
        }

        /* رسالة */
        .message {
            margin-top: 20px;
            padding: 14px;
            border-radius: 16px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: rgba(255,0,85,0.15);
            border: 1px solid rgba(255,0,85,0.3);
            color: #ff6b9d;
        }

        .message.success {
            background: rgba(0,255,136,0.15);
            border: 1px solid rgba(0,255,136,0.3);
            color: #6bffb8;
        }

        .message.info {
            background: rgba(0,242,255,0.15);
            border: 1px solid rgba(0,242,255,0.3);
            color: #6bf0ff;
        }

        /* تذييل */
        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }

        .footer-text a {
            color: #00f2ff;
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .glass-panel { padding: 30px 20px; }
            .logo-text { font-size: 30px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="glass-panel">
                <!-- الشعار -->
                <div class="logo-section">
                    <i class="fas fa-lion logo-icon"></i>
                    <div class="logo-text">VOID LION</div>
                    <div class="logo-subtitle">بوابة الفراغ الرقمي</div>
                </div>

                <!-- تبويبات -->
                <div class="tabs">
                    <button class="tab" id="tabRegister">اشتراك</button>
                    <button class="tab active" id="tabLogin">دخول</button>
                </div>

                <!-- نموذج الدخول -->
                <form id="loginForm" class="auth-form">
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="loginEmail" class="input-field" placeholder="البريد الإلكتروني" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="loginPassword" class="input-field" placeholder="كلمة المرور" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('loginPassword', this)"></i>
                    </div>
                    <button type="submit" class="submit-btn">دخول</button>
                </form>

                <!-- نموذج الاشتراك -->
                <form id="registerForm" class="auth-form hidden">
                    <div class="input-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="regUsername" class="input-field" placeholder="اسم المستخدم" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="regEmail" class="input-field" placeholder="البريد الإلكتروني" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="regPassword" class="input-field" placeholder="كلمة المرور" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('regPassword', this)"></i>
                    </div>
                    <button type="submit" class="submit-btn">إنشاء حساب</button>
                </form>

                <!-- رسالة -->
                <div id="messageBox" class="message"></div>

                <!-- تذييل -->
                <div class="footer-text">
                    <i class="fas fa-shield-alt"></i> تشفير كمومي • <a href="index.html">العودة للرئيسية</a>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/firebase.js"></script>
    <script src="./js/auth.js"></script>
    <script>
        function togglePassword(id, icon) {
            const inp = document.getElementById(id);
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                inp.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const msgBox = document.getElementById('messageBox');

        function showMsg(text, type) {
            msgBox.textContent = text;
            msgBox.className = `message ${type}`;
            msgBox.style.display = 'block';
            if (type === 'success') setTimeout(() => msgBox.style.display = 'none', 3000);
        }

        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            msgBox.style.display = 'none';
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            msgBox.style.display = 'none';
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = loginEmail.value.trim();
            const pass = loginPassword.value;
            if (!email || !pass) return showMsg('أدخل البريد وكلمة المرور', 'error');
            
            showMsg('جاري الدخول...', 'info');
            const r = await VoidAuth.login(email, pass);
            
            if (r.success) {
                showMsg('تم الدخول بنجاح!', 'success');
                setTimeout(() => location.href = 'index.html', 1000);
            } else {
                showMsg(r.error, 'error');
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = regUsername.value.trim();
            const email = regEmail.value.trim();
            const pass = regPassword.value;
            
            if (!name || !email || !pass) return showMsg('أكمل جميع الحقول', 'error');
            if (name.length < 3) return showMsg('الاسم 3 أحرف على الأقل', 'error');
            if (pass.length < 6) return showMsg('كلمة المرور 6 أحرف', 'error');
            
            showMsg('جاري إنشاء الحساب...', 'info');
            const r = await VoidAuth.register(name, email, pass);
            
            if (r.success) {
                showMsg('تم إنشاء الحساب!', 'success');
                setTimeout(() => location.href = 'index.html', 1500);
            } else {
                showMsg(r.error, 'error');
            }
        });

        if (VoidAuth.currentUser) location.href = 'index.html';
    </script>
</body>
</html>
