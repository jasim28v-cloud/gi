<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID LION | الدخول</title>
    <base href="./">
    
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        /* خلفية متحركة فخمة */
        .background {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .gradient-1 {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.15) 0%, transparent 50%);
            animation: float1 15s ease-in-out infinite;
        }

        .gradient-2 {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 70%, rgba(255, 0, 127, 0.1) 0%, transparent 50%);
            animation: float2 18s ease-in-out infinite;
        }

        .gradient-3 {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 255, 136, 0.05) 0%, transparent 60%);
            animation: float3 20s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-5%, -3%) scale(1.05); }
            66% { transform: translate(3%, 5%) scale(0.95); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5%, 3%) scale(1.03); }
            66% { transform: translate(-3%, -5%) scale(0.97); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-2%, 2%) scale(1.02); }
        }

        /* شبكة خلفية */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* الحاوية الرئيسية */
        .auth-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* بطاقة زجاجية فخمة */
        .glass-card {
            background: rgba(10, 20, 30, 0.75);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(0, 242, 255, 0.25);
            border-radius: 40px;
            padding: 40px 30px;
            box-shadow: 
                0 0 80px rgba(0, 242, 255, 0.15),
                0 20px 40px rgba(0, 0, 0, 0.5),
                inset 0 0 30px rgba(0, 242, 255, 0.05);
            transition: all 0.3s;
        }

        .glass-card:hover {
            box-shadow: 
                0 0 100px rgba(0, 242, 255, 0.2),
                0 20px 40px rgba(0, 0, 0, 0.5),
                inset 0 0 40px rgba(0, 242, 255, 0.08);
            border-color: rgba(0, 242, 255, 0.4);
        }

        /* الشعار */
        .logo-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            font-size: 65px;
            color: #00f2ff;
            filter: drop-shadow(0 0 30px rgba(0, 242, 255, 0.5));
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 6px;
            margin-top: 15px;
            background: linear-gradient(135deg, #00f2ff 0%, #00ff88 50%, #00f2ff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .logo-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            letter-spacing: 4px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* تبويبات */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            padding: 5px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 60px;
            border: 1px solid rgba(0, 242, 255, 0.15);
        }

        .tab {
            flex: 1;
            padding: 14px 10px;
            background: transparent;
            border: none;
            border-radius: 50px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #00f2ff, #0066ff);
            opacity: 0;
            transition: opacity 0.4s;
            z-index: -1;
            border-radius: 50px;
        }

        .tab.active {
            color: #000;
        }

        .tab.active::before {
            opacity: 1;
        }

        .tab:not(.active):hover {
            color: #00f2ff;
            background: rgba(0, 242, 255, 0.1);
        }

        /* النماذج */
        .auth-form {
            transition: all 0.4s;
        }

        .auth-form.hidden {
            display: none;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #00f2ff;
            font-size: 18px;
            transition: all 0.3s;
            z-index: 1;
        }

        .input-field {
            width: 100%;
            padding: 16px 50px 16px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1.5px solid rgba(0, 242, 255, 0.2);
            border-radius: 20px;
            color: #fff;
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        .input-field:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.3);
            background: rgba(0, 0, 0, 0.6);
        }

        .input-field:focus + .input-icon {
            color: #fff;
            text-shadow: 0 0 10px #00f2ff;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
        }

        /* زر الإرسال */
        .submit-btn {
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            background: linear-gradient(135deg, #00f2ff 0%, #0066ff 100%);
            border: none;
            border-radius: 20px;
            color: #000;
            font-size: 18px;
            font-weight: 900;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3);
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 242, 255, 0.5);
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .submit-btn i {
            margin-right: 8px;
        }

        /* رسائل التنبيه */
        .message-box {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 14px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .message-box.error {
            background: rgba(255, 0, 85, 0.15);
            border: 1px solid rgba(255, 0, 85, 0.4);
            color: #ff6b9d;
        }

        .message-box.success {
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid rgba(0, 255, 136, 0.4);
            color: #6bffb8;
        }

        .message-box.info {
            background: rgba(0, 242, 255, 0.15);
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: #6bf0ff;
        }

        /* تذييل */
        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
        }

        .footer-text i {
            color: #ff0055;
            margin: 0 3px;
        }

        /* نقاط زخرفية */
        .decoration-dots {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 1px dashed rgba(0, 242, 255, 0.1);
            border-radius: 50%;
            top: -50px;
            left: -50px;
            z-index: 5;
        }

        .decoration-dots-2 {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 1px dashed rgba(255, 0, 127, 0.1);
            border-radius: 50%;
            bottom: -30px;
            right: -30px;
            z-index: 5;
        }

        /* تجاوب */
        @media (max-width: 480px) {
            .glass-card {
                padding: 30px 20px;
                border-radius: 30px;
            }
            
            .logo-text {
                font-size: 28px;
                letter-spacing: 3px;
            }
            
            .tab {
                padding: 12px 8px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="background">
        <div class="gradient-1"></div>
        <div class="gradient-2"></div>
        <div class="gradient-3"></div>
        <div class="grid-overlay"></div>
        <div class="decoration-dots"></div>
        <div class="decoration-dots-2"></div>
    </div>

    <!-- الحاوية الرئيسية -->
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="glass-card">
                <!-- الشعار -->
                <div class="logo-section">
                    <i class="fas fa-lion logo-icon"></i>
                    <div class="logo-text">VOID LION</div>
                    <div class="logo-subtitle">ELITE ACCESS</div>
                </div>

                <!-- التبويبات -->
                <div class="tabs">
                    <button class="tab active" id="tabLogin">
                        <i class="fas fa-sign-in-alt"></i> دخول
                    </button>
                    <button class="tab" id="tabRegister">
                        <i class="fas fa-user-plus"></i> اشتراك
                    </button>
                </div>

                <!-- نموذج الدخول -->
                <form id="loginForm" class="auth-form">
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="loginEmail" class="input-field" placeholder="البريد الإلكتروني" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="loginPassword" class="input-field" placeholder="كلمة المرور" required>
                    </div>
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-arrow-left"></i> دخول إلى الفراغ
                    </button>
                </form>

                <!-- نموذج الاشتراك -->
                <form id="registerForm" class="auth-form hidden">
                    <div class="input-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="regUsername" class="input-field" placeholder="اسم المستخدم" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="regEmail" class="input-field" placeholder="البريد الإلكتروني" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="regPassword" class="input-field" placeholder="كلمة المرور" required>
                    </div>
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-user-check"></i> إنشاء حساب جديد
                    </button>
                </form>

                <!-- رسائل التنبيه -->
                <div id="messageBox" class="message-box" style="display: none;"></div>

                <!-- تذييل -->
                <div class="footer-text">
                    <i class="fas fa-shield-alt"></i> تشفير كمومي <i class="fas fa-circle" style="font-size: 4px; margin: 0 8px;"></i> <i class="fas fa-lock"></i> آمن 100%
                </div>
            </div>
        </div>
    </div>

    <!-- السكريبتات -->
    <script src="./js/firebase.js"></script>
    <script src="./js/auth.js"></script>
    
    <script>
        // تبديل التبويبات
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const messageBox = document.getElementById('messageBox');

        function showMessage(text, type = 'info') {
            messageBox.textContent = text;
            messageBox.className = `message-box ${type}`;
            messageBox.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    messageBox.style.display = 'none';
                }, 3000);
            }
        }

        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            messageBox.style.display = 'none';
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            messageBox.style.display = 'none';
        });

        // تسجيل الدخول
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage('يرجى إدخال البريد الإلكتروني وكلمة المرور', 'error');
                return;
            }
            
            showMessage('🔄 جاري تسجيل الدخول...', 'info');
            
            try {
                const result = await VoidAuth.login(email, password);
                
                if (result.success) {
                    showMessage('✅ تم تسجيل الدخول بنجاح! جاري التحويل...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showMessage(`❌ ${result.error}`, 'error');
                }
            } catch (error) {
                showMessage('❌ حدث خطأ غير متوقع', 'error');
            }
        });

        // إنشاء حساب
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            
            if (!username || !email || !password) {
                showMessage('يرجى ملء جميع الحقول', 'error');
                return;
            }
            
            if (username.length < 3) {
                showMessage('اسم المستخدم يجب أن يكون 3 أحرف على الأقل', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }
            
            showMessage('🔄 جاري إنشاء الحساب...', 'info');
            
            try {
                const result = await VoidAuth.register(username, email, password);
                
                if (result.success) {
                    showMessage('🎉 تم إنشاء الحساب بنجاح! جاري التحويل...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showMessage(`❌ ${result.error}`, 'error');
                }
            } catch (error) {
                showMessage('❌ حدث خطأ غير متوقع', 'error');
            }
        });

        // تأثيرات إضافية للحقول
        document.querySelectorAll('.input-field').forEach(field => {
            field.addEventListener('focus', function() {
                this.parentElement.querySelector('.input-icon').style.color = '#fff';
                this.parentElement.querySelector('.input-icon').style.textShadow = '0 0 15px #00f2ff';
            });
            
            field.addEventListener('blur', function() {
                this.parentElement.querySelector('.input-icon').style.color = '#00f2ff';
                this.parentElement.querySelector('.input-icon').style.textShadow = 'none';
            });
        });

        // منع الدخول إذا كان المستخدم مسجل مسبقاً
        if (VoidAuth.currentUser) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
